# ============================================
# KITTY CONFIG: chill-night
# Estilo dark azulado minimalista
# ============================================

# FUENTE
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        14.0

# ESPACIADO
letter_spacing   0
line_height      1.2
adjust_line_height 2

# CURSOR
cursor                  #00D2FF
cursor_shape            beam
cursor_blink_interval   0

# VENTANA
window_padding_width    12
hide_window_decorations yes
background_opacity      0.88
blur_radius             10

# COLORES - Dark azul noche
foreground              #C8D0E0
background              #0D0F11

# Negros
color0                  #0D1117
color8                  #1C2333

# Rojos
color1                  #E06C75
color9                  #E06C75

# Verdes
color2                  #4CAF7D
color10                 #4CAF7D

# Amarillos
color3                  #E5C07B
color11                 #E5C07B

# Azules (el acento principal)
color4                  #0084C8
color12                 #00AAFF

# Magentas
color5                  #7B68EE
color13                 #9D8FFF

# Cianes
color6                  #00D2FF
color14                 #56CFE1

# Blancos
color7                  #C8D0E0
color15                 #E0E8FF

# SELECCION
selection_background    #00AAFF
selection_foreground    #0A0D14

# SCROLLBACK
scrollback_lines        5000

# URLS
url_color               #00D2FF
url_style               curly

# TABS (si usas)
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0A0D14
active_tab_background   #00AAFF
inactive_tab_foreground #556075
inactive_tab_background #0D1117

# RENDIMIENTO
sync_to_monitor         yes